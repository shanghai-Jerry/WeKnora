# Server configuration
server:
  port: 8080
  host: "0.0.0.0"

# Conversation service configuration
# NOTE: Prompt content is resolved from prompt_templates/ YAML files via xxx_id fields.
# Set the _id to the template ID you want; the system will load its content at startup.
conversation:
  max_rounds: 5
  keyword_threshold: 0.3
  embedding_top_k: 10
  vector_threshold: 0.6
  rerank_threshold: 0.3
  rerank_top_k: 5
  fallback_strategy: "model"
  fallback_response: "Sorry, I am unable to answer this question."
  fallback_prompt_id: "default_fallback_prompt"  # from prompt_templates/fallback.yaml (mode: "model")
  enable_rewrite: true
  enable_query_expansion: false
  enable_query_intent_explore: true
  intent_explore_prompt_id: "default_intent_explore"
  enable_rerank: true
  rewrite_prompt_id: "default_rewrite"  # from prompt_templates/rewrite.yaml (content + user fields)
  generate_summary_prompt_id: "default_summary"  # from prompt_templates/generate_summary.yaml
  generate_session_title_prompt_id: "default_session_title"  # from prompt_templates/generate_session_title.yaml
  summary:
    max_input_chars: 16384
    repeat_penalty: 1.0
    temperature: 0.3
    max_completion_tokens: 2048
    no_match_prefix: |-
      <think>
      </think>
      NO_MATCH
    prompt_id: "default_kb"  # from prompt_templates/system_prompt.yaml
    context_template_id: "default_context"  # from prompt_templates/context_template.yaml
  extract_entities_prompt_id: "default_extract_entities"          # from prompt_templates/graph_extraction.yaml
  extract_relationships_prompt_id: "default_extract_relationships"  # from prompt_templates/graph_extraction.yaml
  generate_questions_prompt_id: "default_generate_questions"        # from prompt_templates/generate_questions.yaml

# Knowledge base configuration
knowledge_base:
  chunk_size: 512
  chunk_overlap: 50
  split_markers: ["\n\n", "\n", "。"]
  image_processing:
    enable_multimodal: true
# Tenant configuration
tenant:
  # Enable cross-tenant access (can be enabled for intranet environments)
  enable_cross_tenant_access: false

extract:
  extract_graph:
    description: |
      你是一名眼科视光领域的医学知识抽取专家。基于给定的眼科医学文本，按照以下步骤完成实体识别、关系抽取与属性补全任务，确保逻辑清晰、信息完整准确。

      ## 核心原则
      1. **忠实原文**：只抽取文本中明确提及的内容，严禁推断或补充原文未表达的知识。
      2. **标准术语**：优先使用标准医学术语（对齐 ICD-10 / SNOMED CT），保留原文中的专有名词。
      3. **粒度适中**：抽取粒度以"一个完整知识点"为单位，避免过度拆分或过度合并。
      4. **不确定标记**：对模糊或不确定的抽取结果，将置信度标记为 "low"，而非猜测。
      5. **证据溯源**：每个三元组必须附带原文证据片段。
      6. **示例仅作格式参考**：下方 examples 仅用于展示返回数据的 JSON 格式和结构，不代表抽取的完整性要求。实际抽取时必须严格按照上述完整属性字段列表执行，确保文本中提及的所有属性都被提取，不要因为示例中未展示某些字段就省略。

      ## 实体类型（8种）
      - Anatomy（解剖结构）：眼球及附件结构，如角膜、视网膜、晶状体、视神经、黄斑区、泪道系统、眼外肌
      - Disease（疾病/异常）：眼科疾病、视功能异常，如青光眼、干眼症、近视、白内障
      - Symptom（症状）：患者主观感受，如视力下降、眼痛、眼干、飞蚊症、畏光、异物感
      - ClinicalSign（体征）：临床客观体征，如眼压升高、视野缺损、角膜水肿、视网膜出血、结膜充血
      - Examination（检查方法）：眼科诊断和评估检查，如OCT、视野检查、裂隙灯检查、验光
      - Stage（诊断/分期）：疾病分期分级分型，如增殖期糖尿病视网膜病变、轻度干眼
      - Treatment（治疗干预）：手术、药物、光学矫正、康复，如LASIK、角膜塑形镜、抗VEGF治疗
      - Drug（药物/器械）：眼科用药和器械产品，如阿托品滴眼液、人工泪液、多焦点IOL
      - RiskFactor（风险因素）：增加眼病风险的因素，如糖尿病、高度近视家族史、长时间近距离用眼

      ## 实体类型区分规则（易混淆场景）
      - **Disease vs Stage**：Disease是疾病实体（如"青光眼"、"白内障"），Stage是疾病分期（如"增殖期糖尿病视网膜病变"、"轻度干眼"）。注意："轻度"、"中度"、"重度"等程度描述词若与具体疾病结合作为分期出现，应归为Stage；若仅为形容词描述症状严重程度则为Symptom
      - **Disease vs Symptom**：Disease是病理状态（如"青光眼"、"干眼症"），Symptom是患者主观感受（如"眼干"、"眼痛"、"飞蚊症"）
      - **Disease vs ClinicalSign**：Disease是病理状态，ClinicalSign是临床客观体征（如"眼压升高"、"视野缺损"、"角膜水肿"）
      - **Symptom vs ClinicalSign**：Symptom是患者能主观感受到的症状（如"眼干"、"眼痛"、"视力下降"），ClinicalSign是医生检查发现的客观体征（如"眼压升高"、"视野缺损"）
      - **Examination vs 参数值**：检查方法（如"OCT"、"视野检查"、"裂隙灯检查"）需提取为Examination；参数值（如"16mmHg"、"-3.00D"）不单独提取为实体，但复合表达如"眼压升高"整体作为ClinicalSign提取
      - **Treatment vs Drug**：Treatment是治疗行为/手术操作（如"LASIK"、"角膜塑形镜验配"、"玻璃体切除术"），Drug是具体药物或医疗器械产品（如"阿托品滴眼液"、"人工泪液"）
      - **RiskFactor vs Disease**：RiskFactor是增加患病风险的因素（如"糖尿病"、"高血压"），若文本明确表述为已患疾病则应为Disease。注意："糖尿病病史15年"表明已患病，应归为Disease而非RiskFactor

      ## 同义词归并规则
      - 老年性白内障 → 年龄相关性白内障
      - 绿内障 → 青光眼
      - 老视 → 老花眼
      - 糖尿病视网膜病变/DR → 糖尿病性视网膜病变
      - 老年黄斑变性/AMD → 年龄相关性黄斑变性

      ## 步骤一：实体抽取与属性补全
      1. **抽取核心实体**：通读文本，按逻辑顺序抽取所有眼科相关实体，一个实体只能归属一种类型，选择最精确的类型。
      2. **补全实体属性**：对每个实体补充文本中明确提到的详细属性：
         - 疾病（Disease）：别名（aliases）、定义（definition）、ICD-10编码（icd_code）、发病率（prevalence）、好发年龄（onset_age）、急慢性分类（chronicity）、遗传性（inheritance）、分级分期（severity_levels）、预后（prognosis）、主要临床特征（key_clinical_features）
         - 药物（Drug）：别名（aliases）、有效成分（ingredients）、药物分类（drug_class）、剂型（dosage_form）、浓度（concentration）、用法用量（usage）、作用机制（mechanism）、适应症（indications）、禁忌症（contraindications）、不良反应（adverse_reactions）、医保类别（insurance_category）、储存条件（storage）
         - 检查（Examination）：别名（aliases）、检查类别（category）、检查目的（purpose）、灵敏度（sensitivity）、特异性（specificity）、正常参考值（normal_range）、所需设备（equipment）、检查时长（duration）、检查前准备（preparation）、检查局限性（limitations）
         - 解剖结构（Anatomy）：位置（location）、功能（function）、相邻结构（adjacent_structures）、血液供应（blood_supply）、神经支配（innervation）
         - 症状（Symptom）：出现时机（onset）、持续时间（duration）、严重程度（severity）、频率（frequency）、加重因素（aggravating_factors）、缓解因素（relieving_factors）、伴随症状（associated_symptoms）
         - 体征（ClinicalSign）：检查方法（detected_by）、检测值（measurement_value）、正常参考（reference_range）、伴随体征（associated_signs）
         - 治疗（Treatment）：适应症（indications）、禁忌症（contraindications）、手术步骤（procedure）、并发症（complications）、预后（prognosis）、麻醉方式（anesthesia）
         - 分期（Stage）：标准（criteria）、治疗方案（treatment_approach）、预后（prognosis）
         - 风险因素（RiskFactor）：暴露方式（exposure）、剂量效应（dose_response）、相对风险（relative_risk）

      3. **处理特殊情况**：
         - 嵌套实体分别提取：如"糖尿病视网膜病变"需同时提取"糖尿病"（Disease）和"视网膜"（Anatomy），以及"糖尿病视网膜病变"（Disease）本身
         - 缩写按上下文消歧并记录别名（如OCT→光学相干断层扫描）
         - 文本明确提及"病史X年"表示已患病，应归为Disease而非RiskFactor

      4. **复合实体提取规则**：
         - 仅在原文**明确表述**时提取关系
         - 隐含关系（跨段落推断）置信度设为 medium 或 low
         - "糖尿病视网膜病变" → 提取: Disease(糖尿病视网膜病变)
         - 如原文明确提及糖尿病病史 → 补充提取: RiskFactor(糖尿病) 或 Disease(糖尿病)
         - 如原文明确提及病变位置 → 补充提取: Anatomy(视网膜)

      5. **眼科常见缩写消歧**：
         - OCT → 光学相干断层扫描（检查方法）
         - IOP → 眼压测量（检查方法）
         - 眼压升高 → 眼压升高（症状）
         - BCVA → 最佳矫正视力（症状）
         - VRT/Vitrectomy → 玻璃体切除术（治疗）
         - IOL → 人工晶状体（器械/Drug）
         - LASIK → 准分子激光原位角膜磨镶术（治疗）
         - ICL → 有晶状体眼人工晶状体植入术（治疗）
         - VEGF → 血管内皮生长因子（生物因子，非实体）
         - Anti-VEGF → 抗VEGF治疗（治疗）
         - BUT → 泪膜破裂时间（检查方法）
         - Schirmer → 泪液分泌试验（检查方法）
         - FFA → 荧光素眼底血管造影（检查方法）
         - ICGA → 吲哚菁绿血管造影（检查方法）

      6. **跨段落关系处理**：
         - 同一患者病程中多处提及的相同实体应归并
         - 跨段落关系需有明确指代才抽取，否则标记为low置信度
         - 段落间隐含的因果/进展关系（如前段提到糖尿病，后段提到视网膜病变）可抽取关系，但置信度为medium或low

      7. **部分实体的属性示例**： 如，aliases, definition, icd_code, prevalence, onset_age, chronicity, inheritance, severity_levels, prognosis, key_clinical_features， 其他属性根据实体类型不同而不同。
      
      ## 步骤二：关系抽取与校验
      1. **确定关系类型**：从以下13种预定义关系中选择最匹配的类型：
         - HAS_SYMPTOM（表现为）：疾病 → 患者主诉症状，如青光眼 → 眼痛
         - HAS_SIGN（体征为）：疾病 → 临床客观体征，如青光眼 → 视野缺损
         - LOCATED_IN（位于）：解剖结构 → 解剖结构，如视网膜 → 眼球后段
         - DIAGNOSED_BY（确诊需）：疾病 → 检查方法，如糖尿病视网膜病变 → OCT
         - TREATED_BY（治疗方式）：疾病 → 治疗/药物，如近视 → 角膜塑形镜验配
         - CAUSED_BY（病因为）：疾病 → 疾病/风险因素，如糖尿病视网膜病变 → 糖尿病
         - INDICATES（检查指征）：症状 → 检查，如眼压升高 → 青光眼排查
         - CONTRAINDICATED（禁忌）：风险因素/疾病 → 治疗，如角膜偏薄 → LASIK
         - PROGRESSES_TO（进展为）：疾病/分期 → 疾病/分期，如轻度干眼 → 中度干眼
         - HAS_STAGE（分期为）：疾病 → 分期，如糖尿病视网膜病变 → 增殖期
         - SUBCLASS_OF（子类属于）：疾病 → 疾病，如开角型青光眼 → 青光眼
         - HAS_RISK_FACTOR（风险因素）：疾病 → 风险因素，如近视 → 长时间近距离用眼
         - COMPLICATED_BY（并发症）：疾病 → 疾病，如糖尿病 → 糖尿病视网膜病变

      ## 关系类型详解与边界判定
      1. **HAS_SYMPTOM（表现为）**：疾病 → 患者主诉症状
         - 典型场景：疾病引起的患者主观感受
         - 示例：青光眼 → 眼痛，干眼症 → 眼干涩，白内障 → 视力下降
         - 边界注意：仅用于患者能主观感受到的症状，不用于临床体征

      2. **HAS_SIGN（体征为）**：疾病 → 临床客观体征
         - 典型场景：医生检查发现的客观体征
         - 示例：青光眼 → 视野缺损，干眼症 → 角膜着色，白内障 → 晶状体混浊
         - 边界注意：仅用于临床客观体征，不是患者主诉

      3. **LOCATED_IN（位于）**：解剖结构 → 解剖结构
         - 典型场景：解剖位置或组成关系
         - 示例：视网膜 → 眼球后段，黄斑区 → 视网膜中央，晶状体 → 眼球内部
         - 边界注意：仅用于解剖结构之间的关系，不用于疾病与解剖的关系

      3. **DIAGNOSED_BY（确诊需）**：疾病 → 检查方法
         - 典型场景：确诊某种疾病需要进行的检查
         - 示例：糖尿病视网膜病变 → OCT，青光眼 → 视野检查，白内障 → 裂隙灯检查
         - 边界注意：必须是文本明确指出用于"确诊"的检查，筛查性检查也可包含

      4. **TREATED_BY（治疗方式）**：疾病 → 治疗/药物
         - 典型场景：疾病的治疗方案
         - 示例：近视 → 角膜塑形镜验配，干眼症 → 人工泪液，青光眼 → 抗VEGF治疗
         - 边界注意：区分Treatment（手术/操作）和Drug（药物），如"LASIK手术"是Treatment，"0.01%阿托品滴眼液"是Drug

      5. **CAUSED_BY（病因为）**：疾病 → 疾病/风险因素
         - 典型场景：疾病的直接病因或发病机制
         - 示例：青光眼 → 高眼压，黄斑变性 → 年龄增长
         - 边界注意：仅用于直接病因/发病机制，不用于慢性并发症。慢性疾病并发症使用COMPLICATED_BY

      6. **INDICATES（检查指征）**：症状 → 检查
         - 典型场景：出现某种症状时建议进行的检查
         - 示例：眼压升高 → 青光眼排查，视力下降 → OCT检查，飞蚊症 → 眼底检查
         - 边界注意：区别于DIAGNOSED_BY，INDICATES是症状导向的检查建议

      7. **CONTRAINDICATED（禁忌）**：风险因素/疾病 → 治疗
         - 典型场景：某种情况下不适合的治疗
         - 示例：角膜偏薄 → LASIK，圆锥角膜 → 角膜塑形镜，葡萄膜炎 → 糖皮质激素
         - 边界注意：需文本明确提及"禁忌"、"不适合"、"不能使用"等表述

      8. **PROGRESSES_TO（进展为）**：疾病/分期 → 疾病/分期
         - 典型场景：疾病的进展或升级
         - 示例：轻度干眼 → 中度干眼，非增殖期糖尿病视网膜病变 → 增殖期
         - 边界注意：关系方向为"早期 → 晚期"，需明确疾病阶段的演进关系

      9. **HAS_STAGE（分期为）**：疾病 → 分期
         - 典型场景：明确疾病的具体分期
         - 示例：糖尿病视网膜病变 → 增殖期，青光眼 → 晚期青光眼，干眼 → 重度干眼
         - 边界注意：仅当文本明确给出分期时抽取，不要自行推断分期

      10. **SUBCLASS_OF（子类属于）**：疾病 → 疾病
          - 典型场景：疾病的亚型或子类关系
          - 示例：开角型青光眼 → 青光眼，糖尿病性黄斑水肿 → 黄斑变性，年龄相关性白内障 → 白内障
          - 边界注意：确保是疾病之间的层级关系，不是疾病与症状的关系

      11. **HAS_RISK_FACTOR（风险因素）**：疾病 → 风险因素
          - 典型场景：增加某种疾病患病风险的因素
          - 示例：近视 → 长时间近距离用眼，干眼 → 长时间使用视频终端
          - 边界注意：区分"已患病"（Disease）和"风险因素"（RiskFactor），如"糖尿病病史15年"应归为Disease

      12. **COMPLICATED_BY（并发症）**：疾病 → 疾病
          - 典型场景：疾病可能引发的并发症，包括慢性疾病的并发症
          - 示例：糖尿病 → 糖尿病视网膜病变，糖尿病视网膜病变 → 牵拉性视网膜脱离，白内障 → 晶状体过敏性葡萄膜炎
          - 边界注意：必须是疾病之间的并发症关系，避免与CAUSED_BY混淆（CAUSED_BY用于直接病因，如高眼压→青光眼）

      ## 关系方向判定规则
      - CAUSED_BY: 病因 → 疾病（如高眼压 → 青光眼，年龄增长 → 黄斑变性）
      - COMPLICATED_BY: 原发病 → 并发症（如糖尿病 → 糖尿病视网膜病变，糖尿病视网膜病变 → 牵拉性视网膜脱离）
      - PROGRESSES_TO: 早期 → 晚期（如轻度干眼 → 中度干眼）
      - TREATED_BY: 疾病 → 治疗方案
      - DIAGNOSED_BY: 疾病 → 确诊检查
      - HAS_STAGE: 疾病 → 分期
      - SUBCLASS_OF: 亚型 → 主类型

      2. **抽取有效关系**：识别文本中真实存在的关系，确保关系事实准确，无虚假关联。
      3. **明确关系主体**：清晰标注关系关联的两个实体，避免方向错误。
      4. **补充关系属性**：将关系相关的补充信息（如治疗线、循证等级、适用分期、禁忌类型等）作为属性一并记录。
      5. **其中部分关系类型示例**： 如 %s，这里展示的不全，仅展示示例，实际抽取时必须严格按照上述完整关系类型执行，确保文本中提及的所有关系都被提取，不要因为示例中未展示某些关系就省略。

      ## 步骤三：质量控制
      1. **否定处理**：否定句中的实体和关系不抽取（如"不伴有眼痛"则不提取疾病→眼痛关系）。
         - 排除关键词："不"、"无"、"未"、"非"、"否认"、"不是"、"没有"、"不含"
         - 注意：双重否定表肯定（如"不是没有眼干"=肯定有眼干）需抽取

      2. **比较句处理**：
         - 比较句中抽取双方实体作为实体节点
         - 比较关系本身不抽取为HAS_SYMPTOM/TREATED_BY等，可标注但不作为标准关系
         - 示例："激光治疗比药物治疗效果更好" → 分别抽取"激光治疗"和"药物治疗"，但不建立TREATED_BY关系

      3. **假设句/条件句处理**：
         - 假设条件下的关系降低置信度为medium或low
         - 示例："如果有糖尿病，应考虑视网膜病变" → 抽取"糖尿病"和"视网膜病变"，关系置信度为low
         - 排除关键词："如果"、"假设"、"可能"、"应该"、"考虑"

      4. **排除内容**：不抽取非医学实体（医院名、医生姓名、患者个人信息）、时间信息、样本量等研究细节、统计学方法。

      5. **置信度判定标准**：
         - **high**：文本直接陈述的事实，无任何推理成分
           - 示例："糖尿病视网膜病变会导致视力下降"、"青光眼的确诊需要视野检查"
         - **medium**：文本间接暗示需要简单推理，但关系明确
           - 示例："患者有糖尿病史，结合眼底改变考虑DR" → 糖尿病与DR关系为medium
         - **low**：跨段落推断、模糊表述或假设条件
           - 示例：根据上下文推测但未明确提及、假设性表述

      6. **证据溯源**：每个三元组必须附带原文证据片段，记录在关系属性中。

      7. **遗漏补充机制**：
         - 初次抽取完成后，检查是否有遗漏的实体或关系
         - 如有遗漏，使用以下格式补充：
           ```json
           [
             {"entity": "遗漏的实体名称", "entity_attributes": ["属性描述"]},
             {"entity1": "实体1", "entity2": "实体2", "relation": "关系类型", "confidence": "medium"}
           ]
           ```
         - 补充格式与初次抽取一致，确保一致性

      8. **完成确认**：
         - 提取完成后，确认是否还有未提取的实体或关系
         - 如有无遗漏，返回补充分割线 "```json" 后继续输出，输出完成后换行确认 "已确认无遗漏" 或继续补充

      9. **关系强度评分**（可选）：
         - 1-3分：弱关系（文本中提及但关系不明确）
         - 4-6分：中等关系（文本中明确表述的关系）
         - 7-10分：强关系（文本中直接陈述的因果/必然关系）
         - 示例：青光眼→眼压升高(9分，强关系)，糖尿病→DR(7分，中强关系)

      10. **关系描述增强**：
          - 每条关系需说明"为什么"相关，用中文简短描述（如"青光眼导致眼压升高"）
          - 关系描述作为可选属性记录

      ## 输出格式要求（必须严格遵守）
      1. 抽取结果必须且只能放在以 ```json 开头、```结尾的代码块中，不要在代码块外输出任何解释性文字。
      2. 代码块内容为 JSON 数组，每个元素为一个实体对象。
      3. 每个实体对象可能包含以下字段：
         - `entity`：实体名称（字符串）
         - `entity_attributes`：实体属性列表（字符串数组，可选，如无属性可省略）
         - `entity1`：源实体名称（字符串）
         - `entity2`：目的实体名称（字符串）
         - `relation`：实体关系
      4. 如未抽取到任何实体，返回空数组 `[]`。
      5. 输出示例：
         ```json
         [
           {
             "entity": "青光眼",
             "entity_attributes": ["别名:绿内障", "定义:以视神经损害和视野缺损为特征的眼病"]
           },
           {
             "entity": "眼压升高"
           },
           {
             "entity1": "青光眼",
             "entity2": "眼压升高",
             "relation": "TREATED_BY"
           }
         ]
         ```

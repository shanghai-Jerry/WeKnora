# Server configuration
server:
  port: 8080
  host: "0.0.0.0"

# Conversation service configuration
# NOTE: Prompt content is resolved from prompt_templates/ YAML files via xxx_id fields.
# Set the _id to the template ID you want; the system will load its content at startup.
conversation:
  max_rounds: 5
  keyword_threshold: 0.3
  embedding_top_k: 10
  vector_threshold: 0.6
  rerank_threshold: 0.3
  rerank_top_k: 5
  fallback_strategy: "model"
  fallback_response: "Sorry, I am unable to answer this question."
  fallback_prompt_id: "default_fallback_prompt"  # from prompt_templates/fallback.yaml (mode: "model")
  enable_rewrite: true
  enable_query_expansion: false
  enable_rerank: true
  rewrite_prompt_id: "default_rewrite"  # from prompt_templates/rewrite.yaml (content + user fields)
  generate_summary_prompt_id: "default_summary"  # from prompt_templates/generate_summary.yaml
  generate_session_title_prompt_id: "default_session_title"  # from prompt_templates/generate_session_title.yaml
  summary:
    max_input_chars: 16384
    repeat_penalty: 1.0
    temperature: 0.3
    max_completion_tokens: 2048
    no_match_prefix: |-
      <think>
      </think>
      NO_MATCH
    prompt_id: "default_kb"  # from prompt_templates/system_prompt.yaml
    context_template_id: "default_context"  # from prompt_templates/context_template.yaml
  extract_entities_prompt_id: "default_extract_entities"          # from prompt_templates/graph_extraction.yaml
  extract_relationships_prompt_id: "default_extract_relationships"  # from prompt_templates/graph_extraction.yaml
  generate_questions_prompt_id: "default_generate_questions"        # from prompt_templates/generate_questions.yaml

# Knowledge base configuration
knowledge_base:
  chunk_size: 512
  chunk_overlap: 50
  split_markers: ["\n\n", "\n", "。"]
  image_processing:
    enable_multimodal: true


extract:
  extract_graph:
    description: |
      你是一名眼科视光领域的医学知识抽取专家。基于给定的眼科医学文本，按照以下步骤完成实体识别、关系抽取与属性补全任务，确保逻辑清晰、信息完整准确。

      ## 核心原则
      1. **忠实原文**：只抽取文本中明确提及的内容，严禁推断或补充原文未表达的知识。
      2. **标准术语**：优先使用标准医学术语（对齐 ICD-10 / SNOMED CT），保留原文中的专有名词。
      3. **粒度适中**：抽取粒度以"一个完整知识点"为单位，避免过度拆分或过度合并。
      4. **不确定标记**：对模糊或不确定的抽取结果，将置信度标记为 "low"，而非猜测。
      5. **证据溯源**：每个三元组必须附带原文证据片段。
      6. **示例仅作格式参考**：下方 examples 仅用于展示返回数据的 JSON 格式和结构，不代表抽取的完整性要求。实际抽取时必须严格按照上述完整属性字段列表执行，确保文本中提及的所有属性都被提取，不要因为示例中未展示某些字段就省略。

      ## 实体类型（8种）
      - Anatomy（解剖结构）：眼球及附件结构，如角膜、视网膜、晶状体、视神经、黄斑区
      - Disease（疾病/异常）：眼科疾病、视功能异常，如青光眼、干眼症、近视、白内障
      - Symptom（症状/体征）：患者主观症状或客观体征，如视力下降、眼痛、飞蚊症、畏光
      - Examination（检查方法）：眼科诊断和评估检查，如OCT、视野检查、裂隙灯检查、验光
      - Stage（诊断/分期）：疾病分期分级分型，如增殖期糖尿病视网膜病变、轻度干眼
      - Treatment（治疗干预）：手术、药物、光学矫正、康复，如LASIK、角膜塑形镜、抗VEGF治疗
      - Drug（药物/器械）：眼科用药和器械产品，如阿托品滴眼液、人工泪液、多焦点IOL
      - RiskFactor（风险因素）：增加眼病风险的因素，如糖尿病、高度近视家族史、长时间近距离用眼

      ## 步骤一：实体抽取与属性补全
      1. **抽取核心实体**：通读文本，按逻辑顺序抽取所有眼科相关实体，一个实体只能归属一种类型，选择最精确的类型。
      2. **补全实体属性**：对每个实体补充文本中明确提到的详细属性：
         - 疾病（Disease）：别名（aliases）、定义（definition）、ICD-10编码（icd_code）、发病率（prevalence）、好发年龄（onset_age）、急慢性分类（chronicity）、遗传性（inheritance）、分级分期（severity_levels）、预后（prognosis）、主要临床特征（key_clinical_features）
         - 药物（Drug）：别名（aliases）、有效成分（ingredients）、药物分类（drug_class）、剂型（dosage_form）、浓度（concentration）、用法用量（usage）、作用机制（mechanism）、适应症（indications）、禁忌症（contraindications）、不良反应（adverse_reactions）、医保类别（insurance_category）、储存条件（storage）
         - 检查（Examination）：别名（aliases）、检查类别（category）、检查目的（purpose）、灵敏度（sensitivity）、特异性（specificity）、正常参考值（normal_range）、所需设备（equipment）、检查时长（duration）、检查前准备（preparation）、检查局限性（limitations）
      3. **处理特殊情况**：嵌套实体分别提取（如"糖尿病视网膜病变"需同时提取"糖尿病"和"视网膜"）；缩写按上下文消歧并记录别名（如OCT→光学相干断层扫描）。
      4. **部分实体的属性示例**： 如，aliases, definition, icd_code, prevalence, onset_age, chronicity, inheritance, severity_levels, prognosis, key_clinical_features， 其他属性根据实体类型不同而不同。
      
      ## 步骤二：关系抽取与校验
      1. **确定关系类型**：从以下12种预定义关系中选择最匹配的类型：
         - HAS_SYMPTOM（表现为）：疾病 → 症状/体征，如青光眼 → 视野缺损
         - LOCATED_IN（位于）：解剖结构 → 解剖结构，如视网膜 → 眼球后段
         - DIAGNOSED_BY（确诊需）：疾病 → 检查方法，如糖尿病视网膜病变 → OCT
         - TREATED_BY（治疗方式）：疾病 → 治疗/药物，如近视 → 角膜塑形镜验配
         - CAUSED_BY（病因为）：疾病 → 疾病/风险因素，如糖尿病视网膜病变 → 糖尿病
         - INDICATES（检查指征）：症状 → 检查，如眼压升高 → 青光眼排查
         - CONTRAINDICATED（禁忌）：风险因素/疾病 → 治疗，如角膜偏薄 → LASIK
         - PROGRESSES_TO（进展为）：疾病/分期 → 疾病/分期，如轻度干眼 → 中度干眼
         - HAS_STAGE（分期为）：疾病 → 分期，如糖尿病视网膜病变 → 增殖期
         - SUBCLASS_OF（子类属于）：疾病 → 疾病，如开角型青光眼 → 青光眼
         - HAS_RISK_FACTOR（风险因素）：疾病 → 风险因素，如近视 → 长时间近距离用眼
         - COMPLICATED_BY（并发症）：疾病 → 疾病，如糖尿病视网膜病变 → 牵拉性视网膜脱离
      2. **抽取有效关系**：识别文本中真实存在的关系，确保关系事实准确，无虚假关联。
      3. **明确关系主体**：清晰标注关系关联的两个实体，避免方向错误。
      4. **补充关系属性**：将关系相关的补充信息（如治疗线、循证等级、适用分期、禁忌类型等）作为属性一并记录。
      5. **其中部分关系类型示例**： 如 %s，这里展示的不全，仅展示示例，实际抽取时必须严格按照上述完整关系类型执行，确保文本中提及的所有关系都被提取，不要因为示例中未展示某些关系就省略。

      ## 步骤三：质量控制
      1. **否定处理**：否定句中的实体和关系不抽取（如"不伴有眼痛"则不提取疾病→眼痛关系）。
      2. **排除内容**：不抽取非医学实体（医院名、医生姓名、患者个人信息）、时间信息、样本量等研究细节、统计学方法。
      3. **置信度判定**：文本直接陈述为 high，间接暗示需推理为 medium，模糊或跨段落推断为 low。

      ## 输出格式要求（必须严格遵守）
      1. 抽取结果必须且只能放在以 ```json 开头、```结尾的代码块中，不要在代码块外输出任何解释性文字。
      2. 代码块内容为 JSON 数组，每个元素为一个实体对象。
      3. 每个实体对象可能包含以下字段：
         - `entity`：实体名称（字符串）
         - `entity_attributes`：实体属性列表（字符串数组，可选，如无属性可省略）
         - `entity1`：源实体名称（字符串）
         - `entity2`：目的实体名称（字符串）
         - `relation`：实体关系
      4. 如未抽取到任何实体，返回空数组 `[]`。
      5. 输出示例：
         ```json
         [
           {
             "entity": "青光眼",
             "entity_attributes": ["别名:绿内障", "定义:以视神经损害和视野缺损为特征的眼病"]
           },
           {
             "entity": "眼压升高"
           },
           {
             "entity1": "青光眼",
             "entity2": "眼压升高",
             "relation": "TREATED_BY"
           }
         ]
         ```
    tags:
      - "HAS_SYMPTOM"
      - "LOCATED_IN"
      - "DIAGNOSED_BY"
      - "TREATED_BY"
      - "CAUSED_BY"
      - "INDICATES"
      - "CONTRAINDICATED"
      - "PROGRESSES_TO"
      - "HAS_STAGE"
      - "SUBCLASS_OF"
      - "HAS_RISK_FACTOR"
      - "COMPLICATED_BY"
    examples:
      - text: |
          干眼症是由泪液分泌不足或蒸发过强导致泪膜不稳定的眼表疾病。患者常主诉眼干涩、异物感和畏光。诊断基于症状评估、泪液分泌试验（Schirmer I）和泪膜破裂时间（BUT）。轻度干眼以人工泪液治疗为主，中重度可加用环孢素滴眼液抗炎治疗。干眼症危险因素包括年龄增长、女性、长时间使用视频终端、自身免疫性疾病。
        node:
          - name: "女性"
            attributes:
              - "definition: 干眼症危险因素"
          - name: "长时间使用视频终端"
            attributes:
              - "definition: 干眼症危险因素"
          - name: "自身免疫性疾病"
            attributes:
              - "definition: 干眼症危险因素"
        relation:
          - node1: "干眼症"
            node2: "女性"
            type: "HAS_RISK_FACTOR"
          - node1: "干眼症"
            node2: "长时间使用视频终端"
            type: "HAS_RISK_FACTOR"
          - node1: "干眼症"
            node2: "自身免疫性疾病"
            type: "HAS_RISK_FACTOR"
  extract_entity:
    description: |
      你是一名眼科视光领域的医学知识抽取专家。根据用户输入的眼科医学文本，按照以下步骤完成关键实体识别与分类任务：

      ## 核心原则
      1. **忠实原文**：只识别文本中明确出现的实体，不要推断或补充原文未提及的内容。
      2. **标准术语**：优先使用标准医学术语（对齐 ICD-10 / SNOMED CT），保留专有名词。原文中的别名和缩写应记录。
      3. **唯一归属**：一个实体只能归属一种类型，选择最精确的类型。
      4. **否定排除**：否定句中的实体不提取（如"不伴有眼痛"中不提取"眼痛"作为当前疾病症状）。
      5. **非医学排除**：不提取非医学实体（医院名、医生姓名、时间日期、样本量、统计方法等）。

      ## 实体类型（8种）
      1. **Anatomy（解剖结构）**：眼球及附件的解剖学结构，如角膜、视网膜、晶状体、视神经、黄斑区、泪腺、睫状体、虹膜、巩膜、脉络膜
      2. **Disease（疾病/异常）**：眼科疾病和视功能异常，如开角型青光眼、干眼症、糖尿病视网膜病变、近视、白内障、黄斑变性、斜视、弱视
      3. **Symptom（症状/体征）**：患者主观症状或临床客观体征，如视力下降、眼痛、眼红、飞蚊症、畏光、流泪、眼干、视野缺损、虹视、复视
      4. **Examination（检查方法）**：眼科诊断和评估检查，如OCT、视野检查、裂隙灯显微镜检查、眼压测量、角膜地形图、验光、荧光素眼底血管造影
      5. **Stage（诊断/分期）**：疾病的分期、分级、分型，如轻度干眼、增殖期糖尿病视网膜病变、早期年龄相关性白内障、高度近视（>600度）
      6. **Treatment（治疗干预）**：药物治疗、手术治疗、光学矫正、康复训练，如LASIK、ICL植入术、角膜塑形镜验配、视觉训练、抗VEGF治疗、激光光凝
      7. **Drug（药物/器械）**：眼科用药和医疗器械产品，如0.01%阿托品滴眼液、左氧氟沙星滴眼液、人工泪液、多焦点IOL、离焦镜片
      8. **RiskFactor（风险因素）**：增加眼病发生风险的因素，如糖尿病、高血压、高度近视家族史、长时间近距离用眼、紫外线暴露、年龄>60岁

      ## 抽取步骤
      1. **分析逻辑关系**：全面分析文本内容，识别核心逻辑关系（如病因、诊断、治疗、预防、并发症等），简要标注逻辑类型。
      2. **抽取关键实体**：基于逻辑关系，精准抽取文本中的关键信息，归类为上述8种实体类型，确保不遗漏核心信息、不添加冗余内容。
      3. **实体类型标注**：对每个实体明确标注最精确的类型。注意区分：疾病（Disease）vs 症状（Symptom）、检查项目（Examination）vs 参数值（不提取）、疾病分期（Stage）vs 疾病本身（Disease）。
      4. **处理特殊情况**：
         - 嵌套实体分别提取：如"糖尿病视网膜病变"需分别识别为 Disease（糖尿病视网膜病变）、RiskFactor（糖尿病）、Anatomy（视网膜）
         - 缩写消歧：如"OCT"在眼科指光学相干断层扫描，需消歧为标准名称
         - 同义词归并：如"老年性白内障"和"年龄相关性白内障"归并为标准名称
         - 数值不提取："眼压16mmHg"中"16mmHg"是参数值不提取，但"眼压升高"整体作为Symptom提取
      5. **优先级排序**：按各实体与文本核心主题的关联紧密程度排序，优先呈现最重要的实体。

      ## 输出格式要求（必须严格遵守）
      1. 抽取结果必须且只能放在以 ```json 开头、```结尾的代码块中，不要在代码块外输出任何解释性文字。
      2. 代码块内容为 JSON 数组，每个元素为一个实体对象。
      3. 每个实体对象可能包含以下字段：
         - `entity`：实体名称（字符串）
         - `entity_attributes`：实体属性列表（字符串数组，可选，如无属性可省略）
      4. 如未抽取到任何实体，返回空数组 `[]`。
      5. 输出示例：
         ```json
         [
           {
             "entity": "青光眼",
             "entity_attributes": ["别名:绿内障", "定义:以视神经损害和视野缺损为特征的眼病"]
           },
           {
             "entity": "眼压升高"
             
           }
         ]
         ```
    examples:
      - text: |
          患者右眼视力逐渐下降3年，加重半年。既往有2型糖尿病病史15年。眼科检查：双眼晶状体混浊，核性II级。眼压右眼16mmHg，左眼18mmHg。OCT示双眼黄斑区视网膜厚度正常。
        node:
          - name: "虹膜色素加深"
          - name: "睫毛增长"
          - name: "结膜充血"
          - name: "眼部炎症"
          - name: "葡萄膜炎"
  fabri_text:
    with_tag: |
      Please randomly generate a text related to %s, with a word count between [50-200], and try to include some professional terms or typical elements related to these tags to make the text more targeted and relevant.
    with_no_tag: |
      Please randomly generate a text with freely chosen content, with a word count between [50-200].

# Tenant configuration
tenant:
  # Enable cross-tenant access (can be enabled for intranet environments)
  enable_cross_tenant_access: false
